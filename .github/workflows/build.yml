name: Build Windows Executable

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter

      - name: Verificar instalação do customtkinter
        run: python -c "import customtkinter; print(customtkinter.__version__)"

      - name: Gerar executável
        run: |
          pyinstaller --onefile --windowed --add-data "data;data" --collect-data customtkinter --hidden-import customtkinter --name ProjetoBITE main.py

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: ProjetoBITE-Windows
          path: dist/ProjetoBITE.exe