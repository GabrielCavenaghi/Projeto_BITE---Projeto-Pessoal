name: Build Windows Executable

on:
  release:
    types: [published]   # Dispara quando um novo Release for publicado
  workflow_dispatch:      # Permite rodar manualmente pela interface do GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter

      - name: Gerar executável
        run: |
          pyinstaller --onefile --windowed --add-data "data;data" --collect-data customtkinter --name ProjetoBITE main.py

      - name: Compactar executável (opcional)
        uses: actions/upload-artifact@v3
        with:
          name: ProjetoBITE-Windows
          path: dist/ProjetoBITE.exe